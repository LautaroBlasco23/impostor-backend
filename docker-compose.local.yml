services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: impostor-api
    container_name: impostor-api
    env_file:
      - .env
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - impostor-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: impostor-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gamedb
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - impostor-network

  redis:
    image: redis:7-alpine
    container_name: impostor-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - impostor-network

volumes:
  postgres_data:
  redis_data:

networks:
  impostor-network:
    driver: bridge
